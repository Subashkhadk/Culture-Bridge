services:
- type: web
name: culture-bridge-api
runtime: node
plan: free
buildCommand: npm install && npm run build
startCommand: npm start
envVars:
- key: DATABASE_URL
sync: false
- key: JWT_SECRET
sync: false
- key: FRONTEND_URL
sync: false
- key: NODE_ENV
value: production
- key: PORT
value: 5001
